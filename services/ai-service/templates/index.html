<!DOCTYPE html>
<html>
<head>

<title>AI Helpdesk Analyzer</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:100px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>AI Ticket Analyzer 🤖</h2>

<textarea id="message" placeholder="Describe your issue..."></textarea>

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

</div>

<script>

function analyze(){

fetch("/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:document.getElementById("message").value
})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("result").innerHTML =
"Predicted Intent: <b>"+data.intent+"</b>";
})

}

</script>

</body>
</html>
